name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit & integration tests
        run: npm run test -- --run

      - name: Build Chrome (MV3)
        run: npm run build

      - name: Build Firefox (MV2)
        run: npm run build:firefox

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            .output/chrome-mv3/
            .output/firefox-mv2/
          retention-days: 7
